version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: datachain_postgres
    restart: always
    environment:
      POSTGRES_USER: datachain_user
      POSTGRES_PASSWORD: datachain_password
      POSTGRES_DB: datachain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: